<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <h3>E-Commerce Website</h3>
      <a href="./pages/cart.html"><button>Cart</button></a>
      <p id="cartItems"></p>
    </header>

    <main>
      <div
        id="modal"
        style="
          display: none;
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: #ffffff;
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
          text-align: center;
          z-index: 999;
          font-family: Arial, sans-serif;
        "
      >
        <h1
          id="modalTitle"
          style="margin-bottom: 20px; font-size: 24px; color: #333"
        ></h1>

        <div id="modalEditInputs" style="display: none;">
          <input type="text" id="editTitleInput" placeholder="Update title" />
          <select id="editCategoryInput">
            <option value="bags">Bags</option>
            <option value="electronics">Electronics</option>
            <option value="shoes">Shoes</option>
          </select>
        </div>

        <button
          id="modalConfirmBtn"
          style="
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
          "
        >
          Confirm
        </button>

        <button
          id="modalCancelBtn"
          style="
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #f44336;
            color: white;
            cursor: pointer;
          "
        >
          Cancel
        </button>
      </div>

      <input type="text" id="addTitleInput" placeholder="Product title">
      <input type="number" id="addPriceInput" placeholder="Product price">
      <select id="addCategoryInput">
        <option value="electronics">Electronics</option>
        <option value="shoes">Shoes</option>
        <option value="bags">Bags</option>
      </select>
      <textarea id="addDescriptionInput" placeholder="Product descripion"></textarea>
      <button id="addProductBtn">Add Product</button>

      <section id="categoryFilters"></section>
      <section id="productsList"></section>
    </main>

    <script src="main.js" type="module"></script>
  </body>
</html>
